name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  api:
    name: API (Python)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: hr_automation
          POSTGRES_USER: hr
          POSTGRES_PASSWORD: hr_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U hr -d hr_automation"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    defaults:
      run:
        working-directory: apps/api
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Lint (ruff)
        run: ruff check .
      - name: Format check (ruff)
        run: ruff format --check .
      - name: Typecheck (mypy)
        run: mypy app
      - name: Migrations (Postgres round-trip)
        env:
          DATABASE_URL: postgresql+psycopg://hr:hr_test@localhost:5432/hr_automation
        run: |
          alembic upgrade head
          alembic downgrade base
      - name: Tests
        env:
          APP_SECRET_KEY: test-secret
          # Throwaway Fernet key so PII-column encryption works under test
          # (matches the default in tests/conftest.py).
          PII_ENC_KEY: pibE2wQxwviWG-XyCs06JmkmvRELomZly4pPz2NvMQo=
          DATABASE_URL: sqlite:///./test.db
        run: pytest -q

  web:
    name: Web (React)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: apps/web/package-lock.json
      - run: npm ci
      - name: Lint
        run: npm run lint
      - name: Typecheck
        run: npm run typecheck
      - name: Tests
        run: npm test -- --run
      - name: Build
        run: npm run build
